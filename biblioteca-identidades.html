    <style>
        :root {
            --bg-color: #050505;
            --text-color: #E0E0E0;
            --text-muted: #888888;
            --card-bg: rgba(20, 20, 20, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary-accent: #ffffff;
            --font-main: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255,255,255,0.03) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255,255,255,0.02) 0%, transparent 50%);
        }

        ::selection {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        /* ===== Header ===== */
        header {
            padding: 6rem 2rem 4rem;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        .lib-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.25);
            font-size: 0.78rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            color: #d4af37;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 5vw, 5rem);
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
            background: linear-gradient(to bottom right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 650px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* ===== Grid ===== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2.5rem;
        }

        /* ===== Card ===== */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(20px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            animation: fadeIn 0.8s ease backwards;
            cursor: pointer;
        }

        .card.is-hybrid {
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
        }

        .card.is-hybrid::before {
            content: 'NOVO HÍBRIDO';
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.3);
            z-index: 10;
        }

        .card-header {
            height: 140px;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-header::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(20,20,20,1));
        }

        .card-body {
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        .identity-domain {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.5rem;
            display: block;
            opacity: 0.9;
        }

        .identity-name {
            font-size: 1.75rem;
            font-weight: 400;
            margin-bottom: 2rem;
            color: #fff;
            line-height: 1.2;
        }

        .card-section {
            margin-bottom: 2rem;
        }

        .card-section h4 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .swatches {
            display: flex;
            gap: 0.75rem;
        }

        .swatch-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .swatch {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
            position: relative;
            transition: transform 0.3s ease;
        }

        .swatch-hex {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        .typo-showcase {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: rgba(0,0,0,0.3);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .typo-item {
            display: flex;
            flex-direction: column;
        }

        .typo-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .typo-sample {
            font-size: 1.4rem;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .components-showcase {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-preview {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .tag-preview {
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Filter Tabs */
        .filters {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: var(--font-main);
            font-size: 0.9rem;
        }

        .filter-btn.active, .filter-btn:hover {
            background: #fff;
            color: #000;
            transform: scale(1.05);
        }
        
        .filter-btn[data-filter="hybrid"] {
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
            background: rgba(255,255,255,0.05);
        }

        /* ===== MODAL OVERLAY ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: #0f0f0f;
            width: 95%;
            max-width: 1400px;
            height: 90vh;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
            position: relative;
            transform: translateY(50px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            font-size: 2rem;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: #fff;
            color: #000;
            transform: scale(1.1);
        }

        .modal-body {
            padding: 4rem;
        }

        /* 3-column Layout for the modal */
        .modal-grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr 1.5fr;
            gap: 3rem;
        }

        .agent-code-block {
            background: #000;
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #a78bfa;
            white-space: pre-wrap;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .agent-code-block::before {
            content: '🤖 AGENT SYSTEM PROMPT';
            display: block;
            font-size: 0.7rem;
            color: #6b7280;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        @media (max-width: 1200px) {
            .modal-grid-layout {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 900px) {
            .modal-grid-layout {
                grid-template-columns: 1fr;
            }
            .modal-body {
                padding: 2rem;
            }
        }
    </style>
</head>

                                </div>

                                <!-- Secondary Card -->
                                <div style="background: ${bgSecondary}; color: ${id.colors[3]}; padding: 2rem 1.5rem; border-radius: 16px; font-family: ${id.fonts[1]?id.fonts[1].family:id.fonts[0].family}; border: 1px solid rgba(150,150,150,0.1);">
                                    <div style="width: 48px; height: 48px; background: ${id.colors[2]}; border-radius: 12px; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center;">
                                        <span style="color: ${id.colors[0]}; font-size: 1.2rem;">✧</span>
                                    </div>
                                    <h3 style="font-family: ${id.fonts[0].family}; margin-bottom: 1rem; font-size: 1.3rem; color: ${id.colors[1]}; line-height: 1.2;">Secundário</h3>
                                    <p style="opacity: 0.8; font-size: 0.85rem; line-height: 1.6;">Cartão auxiliar com ícones terciários.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            modalContent.innerHTML = mockHtml;
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent scrolling on body
        }

        function closeModal() {
            const modalOverlay = document.getElementById('modal-overlay');
            modalOverlay.classList.remove('active');
            document.body.style.overflow = ''; // Restore scrolling
        }

        // Initialize
        renderCards();

        // Filters
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderCards(e.target.dataset.filter);
            });
        });
    </script>
</body>
</html>

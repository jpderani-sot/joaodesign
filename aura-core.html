<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | The Sentient Core</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        /* ==========================================================================
           AURA - SENTIENT CORE (SCROLL-BOUND CINEMATIC EXPERIENCE)
           ========================================================================== */
        
        :root {
            --c-magenta: #ff0055;
            --c-cyan: #00f0ff;
            --c-purple: #7000ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            /* Massive scroll height to drive the timeline */
            height: 700vh;
            background: #000;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            /* Hide scrollbar for immersion */
            overflow-x: hidden;
        }
        
        body::-webkit-scrollbar { display: none; }

        /* Navbar */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; padding: 2rem 3vw;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; mix-blend-mode: difference; pointer-events: none;
        }
        .logo { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 1.5rem; letter-spacing: 0.2em; }
        .status { font-size: 0.8rem; letter-spacing: 0.3em; text-transform: uppercase; }

        /* ==========================================================================
           FIXED CANVAS (Where the magic happens)
           ========================================================================== */
        #canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            overflow: hidden; z-index: 1;
        }

        /* 1. Dynamic Liquid Mesh Background */
        .mesh-bg {
            position: absolute; inset: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, var(--c-magenta), var(--c-purple), #000 70%);
            filter: blur(120px); opacity: 0.8;
            will-change: transform, background;
            z-index: 0;
        }

        /* 2. The Product (Aura Core Ring) */
        /* Mix-blend-mode screen makes the black background of the image completely transparent! */
        .core-orb {
            position: absolute; top: 50%; left: 50%;
            width: 800px; height: 800px; margin-top: -400px; margin-left: -400px;
            background: url('https://images.unsplash.com/photo-1614729939124-032f0b56c9ce?auto=format&fit=crop&w=1500&q=80') center/contain no-repeat;
            mix-blend-mode: screen; z-index: 5;
            will-change: transform;
            /* Add an artificial glow */
            filter: drop-shadow(0 0 50px rgba(0, 240, 255, 0.3));
        }

        /* 3. Typography Layers */
        .text-layer {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            flex-direction: column; text-align: center; z-index: 4;
            pointer-events: none;
        }
        
        .t1 {
            font-family: 'Syncopate', sans-serif; font-size: clamp(4rem, 15vw, 15rem); line-height: 0.8; font-weight: 700;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            will-change: transform, opacity;
        }
        
        .t2, .t3 {
            position: absolute; opacity: 0; transform: translateY(100px);
            font-family: 'Syncopate', sans-serif; font-size: clamp(2rem, 8vw, 8rem); 
            font-weight: 700; text-transform: uppercase; line-height: 1;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            will-change: transform, opacity;
        }

        /* 4. The World Reveal (Smart Home Context) */
        .reveal-layer {
            position: absolute; inset: 0; z-index: 2;
            background: url('https://images.unsplash.com/photo-1558002038-1055907df827?auto=format&fit=crop&w=2500&q=80') center/cover;
            /* Starts completely hidden */
            clip-path: circle(0% at 50% 50%);
            will-change: clip-path;
        }
        .reveal-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 100%); }
        
        .reveal-text {
            position: absolute; top: 50%; left: 8vw; transform: translateY(-50%);
            z-index: 3; opacity: 0; max-width: 500px;
            will-change: transform, opacity;
        }
        .reveal-text h2 { font-family: 'Syncopate', sans-serif; font-size: clamp(2rem, 4vw, 4rem); color: var(--c-cyan); line-height: 1.1; margin-bottom: 1.5rem; }
        .reveal-text p { font-size: 1.2rem; line-height: 1.8; color: #ccc; font-weight: 300; }

        /* 5. Final CTA Screen (The Flash) */
        .final-cta {
            position: absolute; inset: 0; background: #ffffff; color: #000000; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
            opacity: 0; pointer-events: none;
            will-change: opacity;
        }
        .final-cta h1 { font-family: 'Syncopate', sans-serif; font-size: clamp(3rem, 10vw, 10rem); line-height: 0.9; }
        .btn-buy {
            margin-top: 4rem; padding: 1.5rem 5rem; background: #000; color: #fff;
            border-radius: 100px; font-weight: 700; font-size: 1rem; text-decoration: none; 
            text-transform: uppercase; letter-spacing: 0.2em; pointer-events: auto;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-buy:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

        /* Floating particles for depth */
        .particles { position: absolute; inset: 0; z-index: 3; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="1" fill="white" opacity="0.3"/><circle cx="50" cy="80" r="1.5" fill="white" opacity="0.5"/><circle cx="150" cy="30" r="0.8" fill="white" opacity="0.2"/></svg>') repeat; opacity: 0.5; will-change: transform; }

    </style>
</head>
<body>

    <nav>
        <div class="logo">AURA</div>
        <div class="status">System Online</div>
    </nav>

    <!-- Fixed Canvas holds all visual elements. They are mutated via JS based on scroll position -->
    <div id="canvas">
        
        <!-- Animated vibrant background -->
        <div class="mesh-bg" id="mesh"></div>
        <div class="particles" id="particles"></div>
        
        <!-- The Room Reveal Layer -->
        <div class="reveal-layer" id="reveal">
            <div class="reveal-overlay"></div>
            <div class="reveal-text" id="revealText">
                <h2>OMNIPRESENT<br>INTEGRATION</h2>
                <p>Aura maps your physical space in real-time, adjusting acoustics, lighting, and climate before you even enter the room. True luxury is invisible.</p>
            </div>
        </div>

        <!-- The Product (Neon Ring) -->
        <div class="core-orb" id="orb"></div>

        <!-- Typography Sequence -->
        <div class="text-layer">
            <h1 class="t1" id="t1">AURA</h1>
            <h2 class="t2" id="t2">SENTIENT<br>CORE</h2>
            <h2 class="t3" id="t3">UNLIMITED<br>POWER</h2>
        </div>

        <!-- The Ending Whiteout -->
        <div class="final-cta" id="cta">
            <h1>THE FUTURE<br>AWAKENS.</h1>
            <a href="#" class="btn-buy">RESERVE AURA</a>
        </div>

    </div>

    <script>
        // DOM Elements
        const orb = document.getElementById('orb');
        const mesh = document.getElementById('mesh');
        const particles = document.getElementById('particles');
        const t1 = document.getElementById('t1');
        const t2 = document.getElementById('t2');
        const t3 = document.getElementById('t3');
        const reveal = document.getElementById('reveal');
        const revealText = document.getElementById('revealText');
        const cta = document.getElementById('cta');

        // Linear interpolation helper
        function map(val, inMin, inMax, outMin, outMax) {
            let p = (val - inMin) / (inMax - inMin);
            if (p < 0) p = 0; if (p > 1) p = 1;
            return outMin + p * (outMax - outMin);
        }

        let scrollP = 0;
        let ticking = false;

        // The master timeline renderer
        function render() {
            
            // --- GLOBAL ROTATION & COLOR SHIFT ---
            // Mesh gradients rotate and shift hue based on scroll
            mesh.style.background = `radial-gradient(circle at 50% 50%, hsl(${330 + scrollP * 120}, 100%, 50%), hsl(${260 - scrollP * 80}, 100%, 50%), #000 70%)`;
            mesh.style.transform = `rotate(${scrollP * 180}deg) scale(${1 + scrollP * 0.5})`;
            particles.style.transform = `translate3d(0, ${scrollP * -200}px, 0)`;

            // --- PHASE 1: INTRO (0.0 -> 0.15) ---
            // "AURA" fades out and drops down
            let p1 = map(scrollP, 0, 0.15, 0, 1);
            t1.style.opacity = 1 - p1;
            t1.style.transform = `scale(${1 + p1}) translate3d(0, ${p1 * 150}px, 0)`;

            // --- PHASE 2: SENTIENT CORE (0.15 -> 0.35) ---
            let p2In = map(scrollP, 0.15, 0.25, 0, 1);
            let p2Out = map(scrollP, 0.30, 0.40, 0, 1);
            t2.style.opacity = p2In - p2Out;
            t2.style.transform = `translate3d(0, ${map(p2In, 0, 1, 100, 0) - map(p2Out, 0, 1, 0, -100)}px, 0)`;

            // --- PHASE 3: THE ROOM REVEAL (0.40 -> 0.65) ---
            let pReveal = map(scrollP, 0.40, 0.60, 0, 1);
            // Circle expands to reveal the smart home room image
            reveal.style.clipPath = `circle(${pReveal * 150}% at 50% 50%)`;
            
            let pRevTextIn = map(scrollP, 0.45, 0.55, 0, 1);
            let pRevTextOut = map(scrollP, 0.60, 0.65, 0, 1);
            revealText.style.opacity = pRevTextIn - pRevTextOut;
            revealText.style.transform = `translate3d(0, ${map(pRevTextIn, 0, 1, 50, -50) - map(pRevTextOut, 0, 1, 0, -100)}px, 0)`;

            // --- PHASE 4: UNLIMITED POWER (0.65 -> 0.80) ---
            let p3In = map(scrollP, 0.65, 0.70, 0, 1);
            let p3Out = map(scrollP, 0.80, 0.85, 0, 1);
            t3.style.opacity = p3In - p3Out;
            t3.style.transform = `translate3d(0, ${map(p3In, 0, 1, 100, 0) - map(p3Out, 0, 1, 0, -100)}px, 0) scale(${1 + p3In * 0.2})`;

            // --- ORB KINEMATICS (The Magic Element) ---
            // The Orb scales down slightly initially, moves right during the room reveal, and then scales MASSIVELY to transition into white
            let orbScale = 1;
            let orbX = 0;
            
            if (scrollP <= 0.2) {
                orbScale = map(scrollP, 0, 0.2, 1, 0.7);
            } else if (scrollP > 0.2 && scrollP <= 0.4) {
                orbScale = 0.7;
            } else if (scrollP > 0.4 && scrollP <= 0.65) {
                orbScale = 0.7;
                orbX = map(scrollP, 0.4, 0.5, 0, 25); // Move 25vw right to make space for text
            } else if (scrollP > 0.65) {
                orbX = map(scrollP, 0.65, 0.7, 25, 0); // Move back to center
                // Massive zoom! We pass through the center of the ring
                orbScale = map(scrollP, 0.75, 0.90, 0.7, 20); 
            }
            
            // Apply infinite rotation + calculated scale/position
            orb.style.transform = `translate3d(${orbX}vw, 0, 0) rotate(${scrollP * 720}deg) scale(${orbScale})`;

            // --- PHASE 5: THE WHITEOUT & CTA (0.85 -> 1.0) ---
            // As the user passes through the neon ring, the screen blows out to pure white
            let pCTA = map(scrollP, 0.85, 0.95, 0, 1);
            cta.style.opacity = pCTA;
            cta.style.pointerEvents = pCTA > 0.5 ? 'auto' : 'none';
            cta.style.transform = `scale(${map(pCTA, 0, 1, 0.9, 1)})`;

            ticking = false;
        }

        // Passive scroll listener for maximum performance (60fps)
        window.addEventListener('scroll', () => {
            if (!ticking) {
                scrollP = window.scrollY / (document.body.scrollHeight - window.innerHeight);
                window.requestAnimationFrame(render);
                ticking = true;
            }
        }, { passive: true });
        
        // Initial render
        render();
    </script>
</body>
</html>
